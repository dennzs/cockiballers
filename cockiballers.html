<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>COCKIBALLERS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #f3e3c3;
    --cream-2: #ead7b0;
    --wood: #8b4a2b;
    --wood-dark: #5a2e18;
    --red: #c8342a;
    --red-dark: #8a1f17;
    --gold: #e8b54a;
    --ink: #1d130c;
    --skin: #f0c89e;
    --skin-shadow: #d49a6a;
    --hair: #2b1a10;
    --beard: #3a2418;
    --green: #4a7a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Space Mono', monospace;
    background:
      radial-gradient(circle at 20% 20%, rgba(232, 181, 74, 0.15), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(200, 52, 42, 0.12), transparent 50%),
      repeating-linear-gradient(45deg, #2a1810 0 2px, #1a0e08 2px 20px);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
  }

  /* subtle film grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    z-index: 1000;
  }

  .cabinet {
    position: relative;
    width: min(640px, 100%);
    background: linear-gradient(180deg, var(--wood) 0%, var(--wood-dark) 100%);
    border: 6px solid var(--wood-dark);
    border-radius: 24px;
    padding: 28px 28px 32px;
    box-shadow:
      0 0 0 3px var(--gold),
      0 30px 60px rgba(0,0,0,0.5),
      inset 0 0 60px rgba(0,0,0,0.3);
  }

  /* decorative rivets */
  .cabinet::before, .cabinet::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffd97a, #8a5a10);
    box-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  .cabinet::before { top: 14px; left: 14px; }
  .cabinet::after { top: 14px; right: 14px; }

  .marquee {
    text-align: center;
    margin-bottom: 18px;
    position: relative;
  }

  .marquee h1 {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(28px, 6vw, 44px);
    color: var(--gold);
    letter-spacing: 0.05em;
    text-shadow:
      0 0 8px rgba(232,181,74,0.6),
      2px 2px 0 var(--red-dark),
      4px 4px 0 var(--ink);
    line-height: 1;
  }

  .marquee .sub {
    font-family: 'DM Serif Display', serif;
    color: var(--cream);
    font-size: 13px;
    letter-spacing: 0.3em;
    margin-top: 6px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .stage {
    background: var(--cream);
    border: 4px solid var(--ink);
    border-radius: 14px;
    padding: 18px;
    position: relative;
    box-shadow: inset 0 4px 12px rgba(0,0,0,0.25);
  }

  .reels {
    display: flex;
    flex-direction: column;
    gap: 6px;
    border: 3px solid var(--ink);
    border-radius: 10px;
    overflow: hidden;
    background: #000;
  }

  .reel {
    position: relative;
    height: 110px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.15) 100%);
    background-color: var(--cream-2);
  }

  /* light streak on reels for depth */
  .reel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.25) 100%);
    pointer-events: none;
    z-index: 2;
  }

  .reel-strip {
    display: flex;
    height: 100%;
    will-change: transform;
  }

  .reel-strip.spinning {
    animation: spin var(--spin-duration, 2s) cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
  }

  @keyframes spin {
    0% { transform: translateX(0); }
    100% { transform: translateX(var(--target-x)); }
  }

  .slice {
    flex: 0 0 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .slice svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* center indicator */
  .indicator {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 3px;
    background: var(--red);
    transform: translateX(-50%);
    z-index: 5;
    box-shadow: 0 0 8px rgba(200,52,42,0.6);
    pointer-events: none;
  }
  .indicator::before, .indicator::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
  }
  .indicator::before {
    top: -2px;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid var(--red);
  }
  .indicator::after {
    bottom: -2px;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 10px solid var(--red);
  }

  .result {
    margin-top: 16px;
    min-height: 64px;
    background: var(--ink);
    color: var(--gold);
    border-radius: 10px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Bungee', sans-serif;
    font-size: 18px;
    letter-spacing: 0.05em;
    border: 3px solid var(--gold);
    box-shadow: inset 0 0 20px rgba(232,181,74,0.2);
    transition: background 0.3s;
  }

  .result.win {
    background: var(--green);
    color: #fff;
    animation: winFlash 0.6s ease-in-out 3;
  }
  .result.lose {
    background: var(--red-dark);
    color: var(--cream);
  }
  .result.idle {
    color: var(--cream);
    opacity: 0.75;
    font-size: 14px;
  }

  @keyframes winFlash {
    0%, 100% { box-shadow: inset 0 0 20px rgba(255,255,255,0.2), 0 0 0 0 rgba(232,181,74,0); }
    50% { box-shadow: inset 0 0 20px rgba(255,255,255,0.4), 0 0 20px 5px rgba(232,181,74,0.6); }
  }

  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
  }

  .lever {
    background: linear-gradient(180deg, var(--red) 0%, var(--red-dark) 100%);
    color: var(--cream);
    border: 4px solid var(--ink);
    border-radius: 50px;
    padding: 16px 40px;
    font-family: 'Bungee', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow:
      0 6px 0 var(--ink),
      0 8px 12px rgba(0,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  .lever:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 0 var(--ink), 0 10px 14px rgba(0,0,0,0.4);
  }
  .lever:active:not(:disabled) {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--ink), 0 4px 8px rgba(0,0,0,0.4);
  }
  .lever:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .legend {
    margin-top: 18px;
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--cream);
    font-size: 11px;
    line-height: 1.6;
    border: 1px dashed var(--gold);
  }

  .legend h3 {
    font-family: 'Bungee', sans-serif;
    font-size: 13px;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 0.1em;
  }

  .legend ul { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
  .legend li::before { content: '◆ '; color: var(--red); }
  .legend strong { color: var(--gold); }

  .footer-note {
    text-align: center;
    margin-top: 12px;
    color: var(--cream);
    opacity: 0.5;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .cabinet { padding: 18px 16px 22px; }
    .stage { padding: 12px; }
    .reel { height: 90px; }
    .legend ul { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="cabinet">
  <div class="marquee">
    <h1>COCKIBALLERS</h1>
    <div class="sub">— Pull To Reveal —</div>
  </div>

  <div class="stage">
    <div class="reels">
      <div class="reel" id="reel-top">
        <div class="reel-strip" id="strip-top"></div>
      </div>
      <div class="reel" id="reel-mid">
        <div class="reel-strip" id="strip-mid"></div>
      </div>
      <div class="reel" id="reel-bot">
        <div class="reel-strip" id="strip-bot"></div>
      </div>
      <div class="indicator"></div>
    </div>

    <div class="result idle" id="result">Pull the lever to reveal a Cockiballer</div>

    <div class="controls">
      <button class="lever" id="pull">PULL</button>
    </div>
  </div>

  <div class="footer-note">est. 2026 · made in Helsinki</div>
</div>

<script>
// ============================================================
//  SVG slice generators — each reel band is a horizontal strip
//  containing one of the two variants for that face zone.
// ============================================================

// TOP reel: bald vs hair
function topSlice(variant) {
  // viewBox is wide-and-short so the SVG fills the horizontal strip
  if (variant === 'bald') {
    return `<svg viewBox="0 0 300 110" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <!-- background -->
      <rect width="300" height="110" fill="var(--cream-2)"/>
      <!-- head dome (bald) -->
      <ellipse cx="150" cy="120" rx="78" ry="95" fill="var(--skin)"/>
      <ellipse cx="150" cy="120" rx="78" ry="95" fill="url(#topShade)" opacity="0.4"/>
      <!-- shine highlight on bald head -->
      <ellipse cx="125" cy="55" rx="22" ry="10" fill="#fff" opacity="0.45"/>
      <ellipse cx="135" cy="50" rx="8" ry="3" fill="#fff" opacity="0.7"/>
      <!-- ears poking from sides at bottom of strip -->
      <ellipse cx="74" cy="105" rx="10" ry="14" fill="var(--skin)"/>
      <ellipse cx="226" cy="105" rx="10" ry="14" fill="var(--skin)"/>
      <defs>
        <radialGradient id="topShade" cx="50%" cy="100%" r="60%">
          <stop offset="0%" stop-color="#000" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
        </radialGradient>
      </defs>
    </svg>`;
  }
  // hair variant
  return `<svg viewBox="0 0 300 110" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="110" fill="var(--cream-2)"/>
    <!-- head skin underneath -->
    <ellipse cx="150" cy="120" rx="78" ry="95" fill="var(--skin)"/>
    <!-- hair mass -->
    <path d="M 72 95 Q 70 30 110 18 Q 150 0 190 18 Q 230 30 228 95 Q 220 75 210 80 Q 195 60 170 65 Q 150 45 130 65 Q 105 60 90 80 Q 80 75 72 95 Z"
      fill="var(--hair)"/>
    <!-- hair texture strands -->
    <path d="M 100 55 Q 110 40 120 55" stroke="#000" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M 160 45 Q 170 30 180 50" stroke="#000" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M 195 60 Q 205 50 215 65" stroke="#000" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- forehead peek -->
    <path d="M 110 95 Q 150 88 190 95 L 190 105 L 110 105 Z" fill="var(--skin)"/>
    <!-- ears -->
    <ellipse cx="74" cy="105" rx="10" ry="14" fill="var(--skin)"/>
    <ellipse cx="226" cy="105" rx="10" ry="14" fill="var(--skin)"/>
  </svg>`;
}

// MID reel: glasses vs no glasses (eyes area)
function midSlice(variant) {
  const eyes = `
    <!-- eyes -->
    <ellipse cx="115" cy="55" rx="9" ry="11" fill="#fff" stroke="var(--ink)" stroke-width="2"/>
    <ellipse cx="185" cy="55" rx="9" ry="11" fill="#fff" stroke="var(--ink)" stroke-width="2"/>
    <circle cx="115" cy="57" r="4.5" fill="#3a2a1a"/>
    <circle cx="185" cy="57" r="4.5" fill="#3a2a1a"/>
    <circle cx="116.5" cy="55.5" r="1.5" fill="#fff"/>
    <circle cx="186.5" cy="55.5" r="1.5" fill="#fff"/>
    <!-- eyebrows -->
    <path d="M 100 38 Q 115 32 130 40" stroke="var(--hair)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 170 40 Q 185 32 200 38" stroke="var(--hair)" stroke-width="4" fill="none" stroke-linecap="round"/>
  `;

  if (variant === 'glasses') {
    return `<svg viewBox="0 0 300 110" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="110" fill="var(--cream-2)"/>
      <!-- skin face -->
      <ellipse cx="150" cy="55" rx="78" ry="65" fill="var(--skin)"/>
      <!-- ears -->
      <ellipse cx="74" cy="55" rx="11" ry="18" fill="var(--skin)"/>
      <ellipse cx="226" cy="55" rx="11" ry="18" fill="var(--skin)"/>
      <ellipse cx="74" cy="55" rx="5" ry="9" fill="var(--skin-shadow)" opacity="0.6"/>
      <ellipse cx="226" cy="55" rx="5" ry="9" fill="var(--skin-shadow)" opacity="0.6"/>
      ${eyes}
      <!-- nose bridge -->
      <path d="M 148 65 Q 145 78 148 88" stroke="var(--skin-shadow)" stroke-width="2" fill="none" opacity="0.7"/>
      <!-- glasses frames -->
      <g stroke="var(--ink)" stroke-width="3.5" fill="none">
        <rect x="92" y="42" width="46" height="32" rx="6"/>
        <rect x="162" y="42" width="46" height="32" rx="6"/>
        <path d="M 138 55 L 162 55"/>
        <path d="M 92 50 L 78 48"/>
        <path d="M 208 50 L 222 48"/>
      </g>
      <!-- lens glare -->
      <path d="M 100 48 L 115 48 L 100 63 Z" fill="#fff" opacity="0.35"/>
      <path d="M 170 48 L 185 48 L 170 63 Z" fill="#fff" opacity="0.35"/>
    </svg>`;
  }
  // no glasses
  return `<svg viewBox="0 0 300 110" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="110" fill="var(--cream-2)"/>
    <ellipse cx="150" cy="55" rx="78" ry="65" fill="var(--skin)"/>
    <ellipse cx="74" cy="55" rx="11" ry="18" fill="var(--skin)"/>
    <ellipse cx="226" cy="55" rx="11" ry="18" fill="var(--skin)"/>
    <ellipse cx="74" cy="55" rx="5" ry="9" fill="var(--skin-shadow)" opacity="0.6"/>
    <ellipse cx="226" cy="55" rx="5" ry="9" fill="var(--skin-shadow)" opacity="0.6"/>
    ${eyes}
    <!-- nose bridge -->
    <path d="M 148 65 Q 144 80 150 90 Q 156 92 160 88" stroke="var(--skin-shadow)" stroke-width="2.5" fill="none" opacity="0.8"/>
  </svg>`;
}

// BOTTOM reel: beard vs no beard (mouth/chin)
function botSlice(variant) {
  if (variant === 'beard') {
    return `<svg viewBox="0 0 300 110" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="110" fill="var(--cream-2)"/>
      <!-- chin/lower face -->
      <ellipse cx="150" cy="0" rx="78" ry="80" fill="var(--skin)"/>
      <!-- ears top part -->
      <ellipse cx="74" cy="8" rx="10" ry="14" fill="var(--skin)"/>
      <ellipse cx="226" cy="8" rx="10" ry="14" fill="var(--skin)"/>
      <!-- moustache -->
      <path d="M 120 28 Q 135 22 150 28 Q 165 22 180 28 Q 175 38 150 38 Q 125 38 120 28 Z"
        fill="var(--beard)"/>
      <!-- beard mass -->
      <path d="M 95 30 Q 90 60 110 85 Q 130 100 150 100 Q 170 100 190 85 Q 210 60 205 30
               Q 195 50 170 50 Q 150 55 130 50 Q 105 50 95 30 Z"
        fill="var(--beard)"/>
      <!-- beard texture -->
      <path d="M 115 50 Q 120 65 115 80" stroke="#000" stroke-width="1.2" fill="none" opacity="0.4"/>
      <path d="M 150 55 Q 152 75 148 92" stroke="#000" stroke-width="1.2" fill="none" opacity="0.4"/>
      <path d="M 185 50 Q 180 65 185 80" stroke="#000" stroke-width="1.2" fill="none" opacity="0.4"/>
      <!-- mouth peek -->
      <path d="M 138 42 Q 150 46 162 42" stroke="#5a1a1a" stroke-width="2" fill="none"/>
    </svg>`;
  }
  // no beard
  return `<svg viewBox="0 0 300 110" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="110" fill="var(--cream-2)"/>
    <!-- chin -->
    <ellipse cx="150" cy="0" rx="78" ry="80" fill="var(--skin)"/>
    <ellipse cx="74" cy="8" rx="10" ry="14" fill="var(--skin)"/>
    <ellipse cx="226" cy="8" rx="10" ry="14" fill="var(--skin)"/>
    <!-- chin shadow -->
    <ellipse cx="150" cy="78" rx="40" ry="14" fill="var(--skin-shadow)" opacity="0.3"/>
    <!-- mouth -->
    <path d="M 130 35 Q 150 48 170 35" stroke="#7a2418" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 132 36 Q 150 42 168 36" fill="#c8615a"/>
    <!-- subtle stubble dots -->
    <g fill="#3a2418" opacity="0.15">
      <circle cx="130" cy="55" r="0.8"/>
      <circle cx="138" cy="60" r="0.8"/>
      <circle cx="148" cy="62" r="0.8"/>
      <circle cx="158" cy="60" r="0.8"/>
      <circle cx="168" cy="55" r="0.8"/>
      <circle cx="142" cy="68" r="0.8"/>
      <circle cx="155" cy="70" r="0.8"/>
    </g>
  </svg>`;
}

// ============================================================
//  Build the reel strips. Each strip is a long sequence
//  alternating the two variants, so we can scroll horizontally.
// ============================================================

const REEL_LENGTH = 24; // number of slices per strip
const SLICE_W_PERCENT = 100; // each slice is one reel-width

function buildStrip(stripEl, variantA, variantB, sliceFn) {
  let html = '';
  for (let i = 0; i < REEL_LENGTH; i++) {
    const variant = i % 2 === 0 ? variantA : variantB;
    html += `<div class="slice" data-variant="${variant}">${sliceFn(variant)}</div>`;
  }
  stripEl.innerHTML = html;
}

const stripTop = document.getElementById('strip-top');
const stripMid = document.getElementById('strip-mid');
const stripBot = document.getElementById('strip-bot');

buildStrip(stripTop, 'bald', 'hair', topSlice);
buildStrip(stripMid, 'glasses', 'noglasses', midSlice);
buildStrip(stripBot, 'beard', 'nobeard', botSlice);

// ============================================================
//  Spin logic — each reel scrolls to a target slice index.
//  The center indicator is at 50% of the reel width.
//  Each slice is 100% of reel width, so when translated by
//  -(index * 100% - 50% + 50%) it lands centered. Actually we
//  position the strip so the chosen slice sits with its center
//  at the reel center: translateX = -(index - 0.5) * reelWidth + reelWidth/2 ... but
//  simpler: the strip is laid out left-to-right. Slice 0's center
//  is at 0.5*reelWidth. We want chosen slice's center at center
//  of reel (also 0.5*reelWidth in viewport). So translateX must
//  shift center-of-chosen-slice to that point:
//      tx = -(index * reelWidth)
//  because slice index's center is at (index + 0.5) * reelWidth
//  and we want it at 0.5 * reelWidth, so tx = -index * reelWidth.
// ============================================================

const reelTop = document.getElementById('reel-top');
const pullBtn = document.getElementById('pull');
const resultEl = document.getElementById('result');

let spinning = false;

function spinReel(stripEl, reelEl, targetVariant, durationMs) {
  return new Promise(resolve => {
    const slices = Array.from(stripEl.querySelectorAll('.slice'));
    // pick a target index far enough into the strip to feel like real spinning
    // find candidate indices where variant matches
    const candidates = slices
      .map((s, i) => ({ i, v: s.dataset.variant }))
      .filter(o => o.v === targetVariant && o.i >= REEL_LENGTH - 6 && o.i <= REEL_LENGTH - 2);
    const target = candidates[Math.floor(Math.random() * candidates.length)].i;

    const reelWidth = reelEl.clientWidth;
    const targetX = -target * reelWidth;

    // reset
    stripEl.classList.remove('spinning');
    stripEl.style.transform = `translateX(0)`;
    // force reflow
    void stripEl.offsetWidth;

    stripEl.style.setProperty('--spin-duration', `${durationMs}ms`);
    stripEl.style.setProperty('--target-x', `${targetX}px`);
    stripEl.classList.add('spinning');

    setTimeout(() => {
      // lock final position so it stays after animation
      stripEl.style.transform = `translateX(${targetX}px)`;
      resolve(targetVariant);
    }, durationMs);
  });
}

function rollOutcome() {
  return {
    top: Math.random() < 0.5 ? 'bald' : 'hair',
    mid: Math.random() < 0.5 ? 'glasses' : 'noglasses',
    bot: Math.random() < 0.5 ? 'beard' : 'nobeard',
  };
}

function evaluate({ top, mid, bot }) {
  if (top === 'bald' && mid === 'noglasses' && bot === 'nobeard') return { name: 'Ozze',   tag: 'It is Ozze!',   win: true };
  if (top === 'bald' && mid === 'glasses'   && bot === 'beard')   return { name: 'Nix',    tag: 'It is Nix!',    win: true };
  if (top === 'hair' && mid === 'glasses'   && bot === 'nobeard') return { name: 'Riku',   tag: 'It is Riku!',   win: true };
  if (top === 'hair' && mid === 'noglasses' && bot === 'nobeard') return { name: 'Dennis', tag: 'It is Dennis!', win: true };
  if (top === 'hair' && mid === 'noglasses' && bot === 'beard')   return { name: 'Walla',  tag: 'It is Walla!',  win: true };
  if (top === 'hair' && mid === 'glasses'   && bot === 'beard')   return { name: 'Fredu',  tag: 'It is Fredu!',  win: true };
  return { name: null, tag: 'Not a Cockiballer. Try again.', win: false };
}

pullBtn.addEventListener('click', async () => {
  if (spinning) return;
  spinning = true;
  pullBtn.disabled = true;

  resultEl.className = 'result idle';
  resultEl.textContent = 'Spinning...';

  const outcome = rollOutcome();

  // stagger the three reels for a satisfying cascade
  const p1 = spinReel(stripTop, reelTop, outcome.top, 1800);
  const p2 = spinReel(stripMid, document.getElementById('reel-mid'), outcome.mid, 2300);
  const p3 = spinReel(stripBot, document.getElementById('reel-bot'), outcome.bot, 2800);

  await Promise.all([p1, p2, p3]);

  const verdict = evaluate(outcome);
  resultEl.classList.remove('idle');
  if (verdict.win) {
    resultEl.classList.add('win');
    resultEl.textContent = verdict.tag;
  } else {
    resultEl.classList.add('lose');
    resultEl.textContent = verdict.tag;
  }

  spinning = false;
  pullBtn.disabled = false;
});

// Recompute positions on resize so locked transforms stay aligned with slices.
// (Slices are sized in % of reel width, so resizing rescales them; we re-apply
//  the transform proportionally.)
let lastWidth = reelTop.clientWidth;
window.addEventListener('resize', () => {
  const newWidth = reelTop.clientWidth;
  if (newWidth === lastWidth) return;
  [stripTop, stripMid, stripBot].forEach(strip => {
    const m = /translateX\((-?[\d.]+)px\)/.exec(strip.style.transform);
    if (m) {
      const oldPx = parseFloat(m[1]);
      const scaled = oldPx * (newWidth / lastWidth);
      strip.style.transform = `translateX(${scaled}px)`;
    }
  });
  lastWidth = newWidth;
});

// Initial: park each strip on a random starting slice so it looks alive.
window.addEventListener('load', () => {
  const w = reelTop.clientWidth;
  [stripTop, stripMid, stripBot].forEach(strip => {
    const idx = Math.floor(Math.random() * 4);
    strip.style.transform = `translateX(${-idx * w}px)`;
  });
});
</script>
